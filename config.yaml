window_title_contains:
  - "Dwarves"
  - "Glory"
  - "Death"
  - "Loot"

loop_delay_seconds: 0.35
log_file: "bot.log"

deliberation:
  enabled: true
  default_seconds: 0.6
  risky_action_seconds: 1.6
  economy_action_seconds: 1.2
  battle_action_seconds: 0.35

hotkeys:
  toggle: "ctrl+alt+s"
  quit: "ctrl+alt+q"

screen_recorder:
  enabled: true
  data_dir: "learning_data"
  screenshot_interval_seconds: 3.0

tooltip_reader:
  enabled: true
  data_dir: "learning_data/tooltips"
  hover_seconds: 0.9

state_playbook:
  enabled: true

strategy:
  # Until OCR is added, the safest battle-selection rule is to click a visible
  # battle card and rotate if the screen does not change.
  economy_cycle_enabled: true
  equip_method: "click_pair"
  min_equip_score: 2.0
  battle_card_preference: "center_left_right"
