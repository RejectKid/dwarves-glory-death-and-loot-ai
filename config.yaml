window_title_contains:
  - "Dwarves"
  - "Glory"
  - "Death"
  - "Loot"

loop_delay_seconds: 0.35
log_file: "bot.log"

hotkeys:
  toggle: "ctrl+alt+s"
  quit: "ctrl+alt+q"

screen_recorder:
  enabled: true
  data_dir: "learning_data"
  screenshot_interval_seconds: 3.0

state_playbook:
  enabled: true

strategy:
  # Until OCR is added, the safest battle-selection rule is to click a visible
  # battle card and rotate if the screen does not change.
  economy_cycle_enabled: true
  battle_card_preference: "center_left_right"
  bottom_menu:
    tavern_3: 0.347
    storage_4: 0.400
    forge_5: 0.452
    main_hall_6: 0.505
    recruit_dwarves_7: 0.556
    loot_8: 0.608
    battle_9: 0.660
    raid_0: 0.714
  priorities:
    - "advance battle loop"
    - "recruit additional dwarves"
    - "buy/equip useful loot"
    - "visit forge/storage/tavern between fights"
    - "avoid destructive actions"
    - "prefer fights over idle menus"
    - "use wiki/reddit/video baseline for strategy once screen text is readable"
